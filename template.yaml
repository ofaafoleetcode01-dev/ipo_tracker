AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  IPO Tracker — scrapes Indian IPO subscription data from chittorgarh.com
  and sends Telegram alerts on the last day of bidding.

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Telegram Bot API token (from @BotFather)
  TelegramChatId:
    Type: String
    Description: Telegram chat/group ID to send alerts to

Globals:
  Function:
    Timeout: 120
    MemorySize: 256
    Runtime: python3.12

Resources:
  IPOTrackerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_function.handler
      CodeUri: .
      Description: Scrapes IPO subscription data and sends Telegram alerts
      Environment:
        Variables:
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
      Events:
        MorningCheck:
          Type: Schedule
          Properties:
            Schedule: "cron(30 4 ? * MON-FRI *)"
            Description: "10:00 AM IST — morning heads-up"
            Input: '{"mode": "morning"}'
            Enabled: true
        ReportAt3PM:
          Type: Schedule
          Properties:
            Schedule: "cron(30 9 ? * MON-FRI *)"
            Description: "3:00 PM IST — subscription report"
            Input: '{"mode": "report"}'
            Enabled: true
        ReportAt330PM:
          Type: Schedule
          Properties:
            Schedule: "cron(0 10 ? * MON-FRI *)"
            Description: "3:30 PM IST — subscription report"
            Input: '{"mode": "report"}'
            Enabled: true

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref IPOTrackerFunction
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt IPOTrackerFunction.Arn
