scraper:
  source: "CHITTORGARH"
  base_url: "https://www.chittorgarh.com"
  year: 2026

filters:
  ipo_type: "mainboard"        # mainboard only (skip SME)
  only_last_day: true          # only IPOs closing today

alert_rules:
  min_total_subscription: 1.0  # minimum total subscription multiplier (x)
  min_qib_subscription: 0      # minimum QIB subscription (x), 0 = no filter
  min_retail_subscription: 0   # minimum Retail subscription (x), 0 = no filter

aws:
  region_name: "ap-south-1"
  secret_name: "prod/IpoTracker/OFAAFO_TELEGRAM_GROUP_2"