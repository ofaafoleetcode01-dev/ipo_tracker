name: IPO Tracker Bot

on:
  schedule:
    - cron: "30 4 * * 1-5"   # 10:00 AM IST — morning check
    - cron: "30 9 * * 1-5"   # 3:00 PM IST  — subscription report
    - cron: "0 10 * * 1-5"   # 3:30 PM IST  — subscription report
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "report"
        type: choice
        options:
          - report
          - morning

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate config.yaml from secrets
        run: |
          cat > config.yaml << 'YAML_END'
          scraper:
            base_url: "https://www.chittorgarh.com"
            year: 2026

          filters:
            ipo_type: "mainboard"
            only_last_day: true

          alert_rules:
            min_total_subscription: 10.0
            min_qib_subscription: 0
            min_retail_subscription: 0
          YAML_END

          echo "" >> config.yaml
          echo "telegram:" >> config.yaml
          echo "  bot_token: \"${{ secrets.TELEGRAM_BOT_TOKEN }}\"" >> config.yaml
          echo "  chat_id: \"${{ secrets.TELEGRAM_CHAT_ID }}\"" >> config.yaml

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "flag=${{ github.event.inputs.mode == 'morning' && '--morning' || '' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 4 * * 1-5" ]; then
            echo "flag=--morning" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run IPO Tracker
        run: python -m src.main -v ${{ steps.mode.outputs.flag }}
